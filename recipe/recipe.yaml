# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.8"

package:
  name: wagtail-generic-chooser
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/w/wagtail-generic-chooser/wagtail_generic_chooser-${{ version }}.tar.gz
  sha256: 2a8f8391021ff30b00bb2654402b9be1c60c3e4d6ab5c06b416431b31dda6545

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - requests >=2.11.1,<3.0

tests:
  - python:
      imports:
        - generic_chooser
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: A toolkit for custom chooser popups in Wagtail
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/wagtail/wagtail-generic-chooser

extra:
  recipe-maintainers:
    - rxm7706
